services:

  postgres:
    image: postgres:16
    container_name: tcc_postgres
    restart: always
    environment:
      POSTGRES_DB: tcc_db
      POSTGRES_USER: tcc_user
      POSTGRES_PASSWORD: tcc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: